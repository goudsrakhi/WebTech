<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            height: 600px;
            width: 350px;
            background-color: rgb(35, 33, 33);
            border-radius: 20px;
            margin-left: 415px;
            margin-top: 25px;
        }
        #profile{
            height: 100px;
            width: 100px;
            border-radius: 50%;
            margin-top: 50px;
            margin-left: 125px;
        }
        #name{
            color: antiquewhite;
            font-size: 25px;
            padding-left: 80px;
        }
        #loc{
            color: aquamarine;
            padding-left: 120px;
        }
        #details{
            color: white;
            padding-left: 75px;
        }
        .box{
            height: 40px;
            width: 250px;
            background-color: rgb(122, 124, 126);
            margin-left:50px;
            margin-bottom: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .link{
            color: whitesmoke;
        }
    </style>
</head>
<body>
    <div id="container">
        <img id="profile" src="../Assets/profile.jpg" alt="">
        <h1 id="name">Rakesh Sadupalli</h1>
        <p id="loc">Telangna, India</p>
        <p id="details">"Java Full- Stack Developer"</p>
        <div class="box">
            <p class="link">Instagram</p>
        </div>
        <div class="box">
            <p class="link">Github</p>
        </div>
        <div class="box">
            <p class="link">LinkedIn</p>
        </div>
        <div class="box">
            <p class="link">Gmail</p>
        </div>
        <div class="box">
            <p class="link">Whatsapp</p>
        </div>
    </div>
</body>
</html>
