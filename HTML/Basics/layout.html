<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        #container{
            height: 500px;
            width: 800px;
            margin-left: 250px;
            margin-top: 35px;
            background-color: black;
            border-radius: 20px;
        }
        #box1{
            height: 350px;
            width: 800px;
            /* background-color: blue; */
            display: flex;
        }
        #box2{
            height: 150px;
            width: 800px;
            /* background-color: beige; */
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
        #part1{
            height: 350px;
            width: 400px;
            /* background-color: aqua; */
        }
        #part2{
            height: 350px;
            width: 400px;
            /* background-color: lavender; */
            text-align: center;
            padding-top: 35px;
            box-sizing: border-box;
            color:burlywood;
        }
        .cir{
            height: 110px;
            width: 110px;
            border-radius: 50%;
            /* background-color: burlywood; */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #pic1{
            height: 300px;
            width: 300px;
            margin-top: 25px;
            margin-left: 50px;
            border-radius: 50%;
        }
        #username{
            font-size: 55px;
        }
        .details{
            font-size: 35px;
        }
        i{
            font-size: 55px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="box1">
            <div id="part1">
                <img id="pic1" src="https://thumbs.dreamstime.com/b/cartoon-character-d-icon-user-friendly-male-sporting-gentle-smile-transparent-backdrop-supporting-versatile-graphic-design-needs-d-393299314.jpg" alt="">
            </div>
            <div id="part2">
                <h1 id="username">Rakesh Goud</h1>
                <h2 class="details">Full Stack Developer</h2>
                <h2 class="details">9573739575</h2>
            </div>
        </div>
        <div id="box2">
            <div class="cir">
                <i style="color: blue;" class="fa-brands fa-linkedin"></i>
            </div>
            <div class="cir">
                <i style="color: white;" class="fa-brands fa-google"></i>
            </div>
            <div class="cir">
                <i style="color: red;" class="fa-brands fa-instagram"></i>
            </div>
        </div>
    </div>
</body>
</html>
