<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #container{
            height: 500px;
            width: 500px;
            border-radius: 25px;
            background-color: rgb(53, 43, 63);
            margin-left: auto;
            margin-right: auto;
            margin-top: 50px;
            padding: 50px;
        }
        #star_cir{
            height: 50px;
            width: 50px;
            border-radius: 50%;
            background-color: rgb(64, 55, 74);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        i{
            color: goldenrod;
            font-size: 15px;
        }
        h1{
            color: aliceblue;
            margin-top: 30px;

        }
        p{
            color: rgb(153, 156, 156);
            margin-top: 30px;
            font-size: x-large;
        }
        #circles{
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin-top: 30px;
        }
        .cir{
            height: 50px;
            width: 50px;
            border-radius: 50%;
            background-color: rgb(64, 55, 74);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(153, 156, 156);
        }
        button{
            height: 40px;
            margin-top: 30px;
            width: 350px;
            margin-left: 25px;
            margin-right: 25px;
            background-color: goldenrod;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="star_cir"><i class="fa-solid fa-star"></i></div>
        <h1>How did we do?</h1>
        <p>Please let us know how we did with yoour support request. All feedback is appreciated to help us improve our offering!</p>
        <div id="circles">
            <div class="cir">1</div>
            <div class="cir">2</div>
            <div class="cir">3</div>
            <div class="cir">4</div>
            <div class="cir">5</div>
        </div>
        <button>SUBMIT</button>
        
    </div>
</body>
</html
