<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link{
            color: aqua;
        }
        a:visited{
            color: brown;
        }
        a:active{
            color: green;
        }
        button{
            height: 50px;
            width: 200px;
            color: white;
            background-color: black;
        }
        button:hover{
            background-color:chocolate;
            border-radius: 30px;
            transition-duration: 0.5s;
        }
        input:focus{
            color: white;
            background-color: red;
        }
        img{
            width: 200px;
            height: 200px;
        }
        img:hover{
            border-radius: 50px;
            transition-duration: 1s;
        }
    </style>
</head>
<body>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
    <input type="text" placeholder="Enter Name">
    <button>Hover</button>
    <img src="../../Assets/best-chanel-perfume-gabrielle-scaled.jpeg" alt="">
</body>
</html>
