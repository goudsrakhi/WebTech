<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #container{
            height: 500px;
            width: 500px;
            /* width: 900px; */
            border: 2px solid red;
            margin: 100px auto;
            display: flex;
        }
        #box1{
            height: 200px;
            width: 200px;
            background-color: red;
            /* flex-grow: 2; */
            align-self: flex-start;
            /* order: 2; */

        }
        #box2{
            height: 200px;
            width: 200px;
            background-color: yellow;
            /* flex-shrink: 3; */
            /* flex-grow: 2; */
            align-self: center;
            /* order: 3; */
            
        }
        #box3{
            height: 200px;
            width: 200px;
            background-color: green;
            /* flex-grow: 2; */
            align-self: flex-end;
            /* order: 1; */
            
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="box1"><h1>Box1</h1></div>
        <div id="box2"><h1>Box2</h1></div>
        <div id="box3"><h1>Box3</h1></div>
    </div>
</body>
</html>
