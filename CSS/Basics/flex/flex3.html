<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav{
            height: 90px;
            width: 100%;
            background-color: black;
            color: white;
            display: flex;
        }
        a{
            text-decoration: none;
            color: white;
            font-size: 20px;
        }
        #logo>h1::first-letter{
            color: red;
            font-size: 40px;
        }
        #logo{
            flex-basis: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input{
            height: 30px;
            width: 300px;
            border-radius: 10px;
            padding: 10px;
        }
        #nav_opts{
            flex-basis: 40%;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
        #searchBar{
            flex-basis: 25%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #userDetails{
            flex-basis: 20%;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
    </style>
</head>
<body>
    <nav>
        <div id="logo">
            <h1>GoCart</h1>
        </div>
        <div id="nav_opts">
            <div><a href="">Home</a></div>
            <div><a href="">About</a></div>
            <div><a href="">Help</a></div>
            <div><a href="">Contact</a></div>
        </div>
        <div id="searchBar">
            <input type="text" placeholder="Seach...">
        </div>
        <div id="userDetails">
            <div><a href="">Register</a></div>
            <div><a href="">LogIn</a></div>
        </div>
    </nav>
</body>
</html>
